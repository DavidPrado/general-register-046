spring:
  application:
    name: general-registration

  codec:
    max-in-memory-size: 10MB

  r2dbc:
    url: r2dbc:postgresql://localhost:5435/
    username:
    password:
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30m

  boot:
    admin:
      client:
        url: http://localhost:9090
        username:
        password:
        instance:
          metadata:
            user.name: ${spring.security.user.name}
            user.password: ${spring.security.user.password}

  security:
    user:
      name:
      password:
    oauth2:
      resourceserver:
        jwt:
          secret-key-spec:
          jws-algorithm:

server:
  port: 8081
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,loggers,logfile,threaddump,heapdump"
  endpoint:
    health:
      show-details: always
    loggers:
      enabled: true


logging:
  file:
    name: logs/general-registration.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
  level:
    org.springframework.security: INFO
    org.springframework.security.oauth2: INFO
    org.springframework.web: INFO
    org.springframework.web.reactive: INFO